steps:
  # ── Step 1: Build the Docker image ─────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: build
    args:
      - build
      - --tag=gcr.io/$PROJECT_ID/linkservi:$COMMIT_SHA
      - --tag=gcr.io/$PROJECT_ID/linkservi:latest
      - --cache-from=gcr.io/$PROJECT_ID/linkservi:latest
      - --build-arg=VITE_FIREBASE_API_KEY=$_VITE_FIREBASE_API_KEY
      - --build-arg=VITE_FIREBASE_PROJECT_ID=$_VITE_FIREBASE_PROJECT_ID
      - --build-arg=VITE_FIREBASE_APP_ID=$_VITE_FIREBASE_APP_ID
      - .

  # ── Step 2: Push image to Container Registry ────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: push
    waitFor: [build]
    args:
      - push
      - --all-tags
      - gcr.io/$PROJECT_ID/linkservi

  # ── Step 3: Deploy to Cloud Run ─────────────────────────────────────────────
  # Uses --env-vars-file to avoid shell quoting/delimiter issues with special
  # characters in values (e.g. SESSION_SECRET may contain | or , characters).
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: deploy
    waitFor: [push]
    entrypoint: bash
    args:
      - -c
      - |
        # Write env vars to a YAML file — avoids all shell quoting issues
        cat > /workspace/env-vars.yaml << ENVEOF
        NODE_ENV: "production"
        NODE_TLS_REJECT_UNAUTHORIZED: "0"
        DATABASE_URL: "$_DATABASE_URL"
        SESSION_SECRET: "$_SESSION_SECRET"
        SECRET_ENCRYPTION_KEY: "$_SECRET_ENCRYPTION_KEY"
        VITE_FIREBASE_API_KEY: "$_VITE_FIREBASE_API_KEY"
        VITE_FIREBASE_PROJECT_ID: "$_VITE_FIREBASE_PROJECT_ID"
        VITE_FIREBASE_APP_ID: "$_VITE_FIREBASE_APP_ID"
        FIREBASE_PROJECT_ID: "$_FIREBASE_PROJECT_ID"
        BDV_API_KEY: "$_BDV_API_KEY"
        BDV_API_URL: "$_BDV_API_URL"
        BDV_C2P_BASE_URL: "$_BDV_C2P_BASE_URL"
        BDV_WEBHOOK_API_KEY: "$_BDV_WEBHOOK_API_KEY"
        BDV_COMMERCE_PHONE: "$_BDV_COMMERCE_PHONE"
        BDV_DESTINATION_PHONE: "$_BDV_DESTINATION_PHONE"
        BDV_COMMERCE_RIF: "$_BDV_COMMERCE_RIF"
        RESEND_API_KEY: "$_RESEND_API_KEY"
        RESEND_FROM_EMAIL: "$_RESEND_FROM_EMAIL"
        EMAIL_PASSWORD: "$_EMAIL_PASSWORD"
        APP_URL: "$_APP_URL"
        ALLOWED_ORIGIN: "$_ALLOWED_ORIGIN"
        VAPID_PUBLIC_KEY: "$_VAPID_PUBLIC_KEY"
        VAPID_PRIVATE_KEY: "$_VAPID_PRIVATE_KEY"
        INDEXNOW_KEY: "$_INDEXNOW_KEY"
        AI_INTEGRATIONS_GEMINI_BASE_URL: "$_AI_INTEGRATIONS_GEMINI_BASE_URL"
        AI_INTEGRATIONS_GEMINI_API_KEY: "$_AI_INTEGRATIONS_GEMINI_API_KEY"
        DEFAULT_OBJECT_STORAGE_BUCKET_ID: "$_DEFAULT_OBJECT_STORAGE_BUCKET_ID"
        PRIVATE_OBJECT_DIR: "$_PRIVATE_OBJECT_DIR"
        PUBLIC_OBJECT_SEARCH_PATHS: "$_PUBLIC_OBJECT_SEARCH_PATHS"
        ENVEOF

        gcloud run deploy linkservi \
          --image=gcr.io/$PROJECT_ID/linkservi:$COMMIT_SHA \
          --platform=managed \
          --region=$_REGION \
          --port=8080 \
          --min-instances=0 \
          --max-instances=10 \
          --memory=512Mi \
          --cpu=1 \
          --concurrency=80 \
          --timeout=60 \
          --allow-unauthenticated \
          --env-vars-file=/workspace/env-vars.yaml

# ── Substitution defaults ────────────────────────────────────────────────────
